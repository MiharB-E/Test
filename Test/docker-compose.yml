version: '3.8'

# Production compose – uses built images, no hot-reload source mounts
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: invcasa-backend
    ports:
      - "8000:8000"
    volumes:
      # Only mount the persistent data directory, not the full source tree
      - invcasa_data:/app/data
    env_file:
      - ./backend/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: invcasa-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  invcasa_data: